  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    img  { max-width:100%; height:auto; display:block; }
    a    { color:inherit; text-decoration:none; }
    button { font-family:inherit; }

    /* ── Base ── */
    body {
      background: #1d1d1b;
      color: #f0ede8;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    /* ── Container ── */
    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Header ── */
    .header {
      padding: 44px 0 32px;
      text-align: center;
    }
    .header__stamp {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      display: block;
    }
    .header__name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 1.5px;
      color: #f0ede8;
      margin-bottom: 6px;
    }
    .header__tagline {
      font-size: 12px;
      font-weight: 300;
      font-style: italic;
      color: #666;
      letter-spacing: .04em;
    }

    /* ── Link buttons ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }
    .link-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 16px 20px;
      background: #252523;
      border: none;
      border-left: 3px solid #cc1517;
      color: #f0ede8;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .04em;
      text-align: left;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color .25s;
    }
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #cc1517;
      transform: translateX(-100%);
      transition: transform .25s ease;
      z-index: 0;
    }
    .link-btn:hover::before,
    .link-btn:focus::before { transform: translateX(0); }
    .link-btn:active { transform: scale(.98); }
    .link-btn span { position: relative; z-index: 1; }
    .link-btn__arrow {
      position: relative;
      z-index: 1;
      margin-left: auto;
      font-size: 16px;
      opacity: .4;
      transition: opacity .25s;
    }
    .link-btn:hover .link-btn__arrow { opacity: 1; }

    /* ── Academy AVD banner ── */
    .avd-banner {
      position: relative;
      background: linear-gradient(135deg, rgba(204,21,23,.18) 0%, rgba(204,21,23,.07) 100%);
      border: 1px solid rgba(204,21,23,.35);
      padding: 28px 24px;
      margin-bottom: 24px;
      text-align: center;
      overflow: hidden;
    }
    .avd-banner::after {
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 100px;
      height: 100px;
      background: rgba(204,21,23,.08);
      border-radius: 50%;
    }
    .avd-banner__label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #cc1517;
      margin-bottom: 8px;
    }
    .avd-banner__headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: .5px;
      color: #f0ede8;
      margin-bottom: 6px;
      line-height: 1.1;
    }
    .avd-banner__sub {
      font-size: 12px;
      font-weight: 300;
      color: rgba(240,237,232,.6);
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .avd-banner__cta {
      display: inline-block;
      background: #cc1517;
      color: #f0ede8;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 11px 28px;
      border: 1px solid #cc1517;
      transition: all .25s;
      position: relative;
      z-index: 1;
    }
    .avd-banner__cta:hover {
      background: transparent;
      color: #cc1517;
    }

    /* ── Social row ── */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-bottom: 40px;
    }
    .social-icon {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s;
    }
    .social-icon svg {
      width: 22px;
      height: 22px;
      fill: #555;
      transition: fill .2s;
    }
    .social-icon:hover { transform: translateY(-2px); }
    .social-icon:hover svg { fill: #cc1517; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 28px 0 40px;
      border-top: 1px solid rgba(204,21,23,.15);
    }
    .footer__name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: .8px;
      color: #f0ede8;
      margin-bottom: 6px;
    }
    .footer__copy {
      font-size: 11px;
      color: #444;
    }

    /* ── Responsive tweak ── */
    @media (max-width: 390px) {
      .header__name { font-size: 24px; }
      .link-btn { font-size: 13px; padding: 15px 16px; }
    }
  </style>
</head>
