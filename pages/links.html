    <!-- Google Fonts Only -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* CSS Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #1d1d1b;
            color: #f0ede8;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Header */
        .header {
            padding: 40px 20px 30px;
            text-align: center;
        }

        .skull-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            display: block;
        }

        .header-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 1px;
            color: #f0ede8;
            margin-bottom: 8px;
        }

        .header-tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 300;
            font-style: italic;
            color: #888;
        }

        /* Main Container */
        .container {
            max-width: 430px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* Link Buttons */
        .link-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .link-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            background-color: #252525;
            border: none;
            border-left: 4px solid #cc1417;
            color: #f0ede8;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: left;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cc1417;
            width: 0;
            transition: width 0.3s ease;
            z-index: -1;
        }

        .link-btn:hover {
            color: #f0ede8;
        }

        .link-btn:hover::before {
            width: 100%;
        }

        .link-btn:active {
            transform: scale(0.98);
        }

        /* Promo Banner */
        .promo-banner {
            background: linear-gradient(135deg, rgba(204, 20, 23, 0.15) 0%, rgba(204, 20, 23, 0.05) 100%);
            border: 1px solid rgba(204, 20, 23, 0.3);
            border-radius: 4px;
            padding: 24px 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .promo-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #cc1417;
            margin-bottom: 8px;
        }

        .promo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 0.5px;
            color: #f0ede8;
            margin-bottom: 16px;
        }

        .promo-btn {
            display: inline-block;
            background-color: #cc1417;
            color: #f0ede8;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 12px 24px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid #cc1417;
        }

        .promo-btn:hover {
            background-color: transparent;
            color: #cc1417;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-link {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .social-link svg {
            width: 100%;
            height: 100%;
            fill: #888;
            transition: fill 0.3s ease;
        }

        .social-link:hover svg {
            fill: #cc1417;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid rgba(204, 20, 23, 0.2);
        }

        .footer-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 0.5px;
            color: #f0ede8;
            margin-bottom: 8px;
        }

        .footer-copyright {
            font-size: 12px;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 0 16px 30px;
            }

            .header {
                padding: 30px 16px 20px;
            }

            .header-title {
                font-size: 28px;
            }

            .link-btn {
                font-size: 14px;
                padding: 14px 16px;
            }

            .promo-text {
                font-size: 18px;
            }
        }

        /* Performance Optimization */
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            color: inherit;
        }

        button {
            font-family: inherit;
        }
    </style>
</head>

    <!-- GA4 Tracking Script -->
    <script>
        // GA4 Tracking Function
        function trackLink(name, url, position) {
            if (typeof gtag !== 'undefined') {
                gtag('event', 'link_click', {
                    link_name: name,
                    link_url: url,
                    link_position: position
                });
            }
            return true;
        }

        // Return false to prevent navigation to # placeholders
        document.querySelectorAll('a[href="#"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
            });
        });
    </script>
